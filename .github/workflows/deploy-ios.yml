name: Deploy iOS

on:
  workflow_dispatch:
    inputs:
      lane:
        description: 'Fastlane lane to run (beta or release)'
        required: true
        default: 'beta'

jobs:
  deploy:
    name: Deploy iOS via Fastlane
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Ruby for Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Install and update Ruby dependencies
        run: |
          bundle install
          bundle update fastlane

      - name: Install CocoaPods
        run: bundle exec pod install --project-directory=ios

      - name: Write App Store Connect API key
        env:
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p private_keys
          echo "$ASC_KEY_CONTENT" | base64 -d > private_keys/AuthKey_pkcs8.p8
          openssl ec -in private_keys/AuthKey_pkcs8.p8 -out "private_keys/AuthKey_${ASC_KEY_ID}.p8"
          rm private_keys/AuthKey_pkcs8.p8

      - name: Deploy to TestFlight / App Store
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_FILEPATH: private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
        run: bundle exec fastlane ios ${{ github.event.inputs.lane }}

