name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  test:
    name: Verify (unit / typecheck)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm test --silent

  build:
    name: Build mobile artifacts
    needs: test
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Ruby and Bundler (for Fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install CocoaPods
        run: bundle exec pod install --project-directory=ios

      - name: Build iOS debug (Detox) – sanity check
        run: bundle exec fastlane ios build_debug

      - name: Build Android debug APK
        run: bundle exec fastlane android build_debug

      - name: Upload build outputs (archives/bundles) as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-builds
          path: |
            ios/*.ipa
            android/app/build/outputs/**/*.apk
            android/app/build/outputs/**/*.aab
          if-no-files-found: ignore

  release:
    name: Semantic Release
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release

